<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Gestão de Pacientes</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f1f1f1;
            margin: 0;
        }

        header {
            background: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 20px;
        }

        .container {
            width: 500px;
            margin: 30px auto;
            background: white;
            padding: 20px;
            border: 1px solid #ccc;
        }

        h2 {
            margin-top: 0;
            border-bottom: 1px solid #ddd;
            padding-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
            border: 1px solid #ccc;
        }

        button {
            background: #2c3e50;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            cursor: pointer;
        }

        button:hover {
            background: #1a252f;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: left;
        }

        th {
            background: #eee;
        }

        .btn-delete {
            background: #c0392b;
            padding: 5px;
            font-size: 12px;
        }

        .btn-delete:hover {
            background: #922b21;
        }
    </style>
</head>

<body>

<header>
    Sistema de Pacientes
</header>

<div class="container">

    <h2>Cadastro</h2>

    <input type="text" id="nome" placeholder="Nome">
    <input type="text" id="cpf" placeholder="CPF">
    <input type="text" id="telefone" placeholder="Telefone">
    <input type="email" id="email" placeholder="Email">
    <input type="date" id="dataNascimento">
    <input type="text" id="plano" placeholder="Plano Odontológico">

    <button onclick="cadastrar()">Cadastrar</button>

    <h2>Pacientes</h2>
    <button onclick="listar()">Atualizar Lista</button>

    <table>
        <thead>
        <tr>
            <th>Nome</th>
            <th>Email</th>
            <th>Ação</th>
        </tr>
        </thead>
        <tbody id="tabela"></tbody>
    </table>

</div>

<script>
    const API = "http://localhost:8081/paciente";

    // CADASTRAR
    async function cadastrar() {
        const paciente = {
            nome: document.getElementById("nome").value,
            cpf: document.getElementById("cpf").value,
            telefone: document.getElementById("telefone").value,
            email: document.getElementById("email").value,
            dataNascimento: document.getElementById("dataNascimento").value || null,
            planoOdontologico: document.getElementById("plano").value
        };

        try {
            const res = await fetch(API, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(paciente)
            });

            if (res.ok) {
                alert("Paciente cadastrado");
                listar();
            } else {
                alert("Erro ao cadastrar");
            }

        } catch {
            alert("Erro na API");
        }
    }

    // LISTAR
    async function listar() {
        try {
            const res = await fetch(API);
            const data = await res.json();

            const tabela = document.getElementById("tabela");
            tabela.innerHTML = "";

            data.forEach(p => {
                tabela.innerHTML += `
        <tr>
          <td>${p.nome}</td>
          <td>${p.email}</td>
          <td>
            <button class="btn-delete" onclick="deletar(${p.id})">Excluir</button>
          </td>
        </tr>
      `;
            });

        } catch {
            alert("Erro ao buscar pacientes");
        }
    }

    // DELETAR
    async function deletar(id) {
        if (!confirm("Deseja excluir?")) return;

        try {
            const res = await fetch(API + "/" + id, {
                method: "DELETE"
            });

            if (res.ok) {
                listar();
            }

        } catch {
            alert("Erro ao deletar");
        }
    }
</script>

</body>
</html>
